<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SoundPanel 7 - Management</title>
  <style>
    body { margin:0; font-family:system-ui; background:#0b0f14; color:#e6eef8; }
    header { background:#101826; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; }
    a { color:#b8c7dd; text-decoration:none; }
    .wrap { padding:20px; display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
    .card { background:#101826; border-radius:16px; padding:16px; }
    label { display:block; margin-top:10px; color:#b8c7dd; font-size:14px; }
    input { width:100%; padding:10px; border-radius:10px; border:0; margin-top:6px; background:#111827; color:#e6eef8; }
    .row { display:flex; gap:10px; }
    .btn { padding:10px 12px; border-radius:12px; border:0; background:#1f2937; color:#e6eef8; cursor:pointer; }
    .btn.primary { background:#2563eb; }
    .btn.danger { background:#b91c1c; }
    .small { font-size:12px; color:#b8c7dd; margin-top:8px; }
    @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header>
  <div><b>SoundPanel 7</b> <span class="muted">Management</span></div>
  <div><a href="/">↩ Dashboard</a></div>
</header>

<div class="wrap">
  <div class="card">
    <h3>Network</h3>
    <div class="small" id="netstate">--</div>
    <label>Hostname</label>
    <input id="hostname" placeholder="soundpanel7"/>

    <label>NTP server</label>
    <input id="ntp" placeholder="fr.pool.ntp.org"/>

    <div class="row" style="margin-top:12px">
      <button class="btn primary" onclick="SP7.saveSettings()">Save</button>
      <button class="btn" onclick="SP7.startWifiPortal()">Start WiFi setup (AP)</button>
    </div>
    <div class="small">Le portail WiFi crée un AP + captive portal pour saisir SSID/password.</div>
  </div>

  <div class="card">
    <h3>MQTT</h3>
    <label>Enabled (0/1)</label>
    <input id="mqtt_enabled" placeholder="0"/>

    <div class="row">
      <div style="flex:1">
        <label>Host</label>
        <input id="mqtt_host" placeholder="192.168.1.10"/>
      </div>
      <div style="width:120px">
        <label>Port</label>
        <input id="mqtt_port" placeholder="1883"/>
      </div>
    </div>

    <label>Base topic</label>
    <input id="mqtt_topic" placeholder="soundpanel7"/>

    <label>Interval (s)</label>
    <input id="mqtt_interval" placeholder="5"/>

    <div class="row" style="margin-top:12px">
      <button class="btn" onclick="SP7.testPublish()">Test publish</button>
    </div>
  </div>

  <div class="card">
    <h3>Audio</h3>
    <label>Mock audio (0/1)</label>
    <input id="audio_mock" placeholder="1"/>

    <label>Calibration offset (dB)</label>
    <input id="cal_offset" placeholder="0"/>

    <label>Calibration gain</label>
    <input id="cal_gain" placeholder="1.00"/>

    <label>EMA alpha</label>
    <input id="ema_alpha" placeholder="0.18"/>
  </div>

  <div class="card">
    <h3>UI</h3>
    <label>Backlight (%)</label>
    <input id="backlight" placeholder="80"/>

    <label>Threshold green</label>
    <input id="th_green" placeholder="55"/>

    <label>Threshold orange</label>
    <input id="th_orange" placeholder="70"/>

    <label>Warning delay (s)</label>
    <input id="warning_hold_sec" placeholder="3"/>

    <label>Critical delay (s)</label>
    <input id="critical_hold_sec" placeholder="2"/>

    <div class="row" style="margin-top:12px">
      <button class="btn danger" onclick="SP7.factoryReset()">Factory reset</button>
      <button class="btn danger" onclick="SP7.reboot()">Reboot</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
<script>
  SP7.startManagement();
</script>
</body>
</html>
