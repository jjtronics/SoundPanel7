<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SoundPanel 7</title>
  <style>
    body { margin:0; font-family:system-ui; background:#0b0f14; color:#e6eef8; }
    header { background:#101826; padding:14px 16px; display:flex; justify-content:space-between; align-items:center; }
    a { color:#b8c7dd; text-decoration:none; }
    .wrap { padding:20px; }
    .big { font-size:64px; font-weight:700; letter-spacing:-1px; }
    .row { display:flex; gap:16px; flex-wrap:wrap; margin-top:12px; }
    .card { background:#101826; border-radius:16px; padding:16px; min-width:220px; }
    .muted { color:#b8c7dd; }
    .bar { height:18px; background:#111827; border-radius:999px; overflow:hidden; margin-top:14px; }
    .fill { height:100%; width:0%; background:#22c55e; transition:width .15s linear, background .15s linear; }
    .pill { display:inline-block; padding:6px 10px; border-radius:999px; background:#111827; margin-right:8px; }
  </style>
</head>
<body>
<header>
  <div><b>SoundPanel 7</b> <span class="muted">Dashboard</span></div>
  <div>
    <a href="/mgmt.html">⚙️ Management</a>
  </div>
</header>
<div class="wrap">
  <div class="big" id="db">--.- dB</div>
  <div class="row">
    <div class="card"><div class="muted">Leq</div><div style="font-size:28px" id="leq">--.-</div></div>
    <div class="card"><div class="muted">Peak</div><div style="font-size:28px" id="peak">--.-</div></div>
    <div class="card"><div class="muted">Time</div><div style="font-size:28px" id="time">--:--</div></div>
  </div>

  <div class="bar"><div class="fill" id="bar"></div></div>

  <div style="margin-top:16px">
    <span class="pill" id="wifi">WiFi: --</span>
    <span class="pill" id="mqtt">MQTT: --</span>
    <span class="pill" id="ntp">NTP: --</span>
  </div>
</div>

<script src="/app.js"></script>
<script>
  SP7.startDashboard();
</script>
</body>
</html>
