name: Hassfest

on:
  push:
    paths:
      - "custom_components/**"
      - ".github/workflows/hassfest.yml"
  pull_request:
    paths:
      - "custom_components/**"
      - ".github/workflows/hassfest.yml"
  workflow_dispatch:

jobs:
  hassfest:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run hassfest validation
        uses: home-assistant/actions/hassfest@master
